<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head}"></head>
<body class="bg-light">
<div th:replace="~{base :: navbar}"></div>

<div class="container py-5">
    <!-- Mensajes de éxito/error -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">
                <i class="fas fa-trophy me-2 text-warning"></i>
                <span th:text="#{tournaments.upcoming.title}">Próximos Torneos</span>
            </h3>
            <a sec:authorize="hasAnyRole('ADMIN', 'ROLE_ADMIN')"
               th:href="@{/admin/tournament/new}"
               class="btn btn-warning">
                <i class="fas fa-plus me-1"></i>
                <span th:text="#{tournaments.button.new}">Nuevo Torneo</span>
            </a>
        </div>
        <div class="card-body">
            <!-- Torneos próximos -->
            <div th:if="${#lists.isEmpty(upcomingTournaments)}" class="alert alert-info"
                 th:text="#{tournaments.upcoming.empty}">
                No hay torneos programados próximamente.
            </div>
            <div th:unless="${#lists.isEmpty(upcomingTournaments)}" class="row row-cols-1 row-cols-md-2 g-4">
                <div th:each="tournament : ${upcomingTournaments}" class="col">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${tournament.name}"></h5>
                            <p class="text-muted">
                                <i class="fas fa-calendar me-2"></i>
                                <span th:text="${#temporals.format(tournament.eventDate, 'dd/MM/yyyy HH:mm')}"></span>
                            </p>
                            <p class="text-muted">
                                <i class="fas fa-map-marker-alt me-2"></i>
                                <span th:text="${tournament.location}"></span>
                            </p>
                            <p class="card-text" th:text="${#strings.abbreviate(tournament.description, 150)}"></p>
                        </div>
                        <div class="card-footer bg-transparent d-flex justify-content-between">
                            <a th:href="@{'/tournament/' + ${tournament.id}}" class="btn btn-primary btn-sm">
                                <i class="fas fa-info-circle me-1"></i>
                                <span th:text="#{tournaments.button.details}">Ver Detalles</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Torneos pasados -->
            <h4 class="mt-5 mb-3" th:text="#{tournaments.past.title}">Torneos Anteriores</h4>
            <div th:if="${#lists.isEmpty(pastTournaments)}" class="alert alert-info"
                 th:text="#{tournaments.past.empty}">
                No hay registro de torneos anteriores.
            </div>
            <div th:unless="${#lists.isEmpty(pastTournaments)}" class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th th:text="#{tournaments.table.name}">Nombre</th>
                        <th th:text="#{tournaments.table.date}">Fecha</th>
                        <th th:text="#{tournaments.table.location}">Lugar</th>
                        <th th:text="#{tournaments.table.actions}">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tournament : ${pastTournaments}">
                        <td th:text="${tournament.name}"></td>
                        <td th:text="${#temporals.format(tournament.eventDate, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${tournament.location}"></td>
                        <td>
                            <a th:href="@{'/tournament/' + ${tournament.id}}"
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-info-circle"></i>
                                <span th:text="#{tournaments.button.view}">Ver</span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
