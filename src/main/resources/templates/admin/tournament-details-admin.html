<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head}"></head>
<body class="bg-light">
<div th:replace="~{base :: navbar}"></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h3 class="mb-0">
            <i class="fas fa-edit me-2"></i>
            <span th:text="#{admin.tournament.edit.title}">Editar Torneo</span>
          </h3>
          <span class="badge bg-warning text-dark" th:text="#{admin.mode}">
            Modo Admin
          </span>
        </div>
        <div class="card-body">
          <form th:action="@{'/admin/tournament/update/' + ${tournament.id}}" method="POST">
            <div class="mb-3">
              <label class="form-label" th:text="#{admin.tournament.name}">Nombre del Torneo</label>
              <input type="text" class="form-control" name="name"
                     th:value="${tournament.name}" required>
            </div>

            <div class="mb-3">
              <label class="form-label" th:text="#{admin.tournament.description}">Descripción</label>
              <textarea class="form-control" name="description"
                        rows="3" required
                        th:text="${tournament.description}"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label" th:text="#{admin.tournament.datetime}">Fecha y Hora</label>
              <input type="datetime-local" class="form-control" name="eventDate"
                     th:value="${#temporals.format(tournament.eventDate, 'yyyy-MM-dd''T''HH:mm')}"
                     required>
            </div>

            <div class="mb-3">
              <label class="form-label" th:text="#{admin.tournament.location}">Lugar</label>
              <input type="text" class="form-control" name="location"
                     th:value="${tournament.location}" required>
            </div>

            <div class="d-flex justify-content-between">
              <a href="/tournaments" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>
                <span th:text="#{admin.button.cancel}">Cancelar</span>
              </a>
              <button type="button" class="btn btn-danger"
                      data-bs-toggle="modal" data-bs-target="#deleteModal">
                <i class="fas fa-trash me-1"></i>
                <span th:text="#{admin.tournament.button.delete}">Eliminar</span>
              </button>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>
                <span th:text="#{admin.button.save}">Guardar Cambios</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>


<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" th:text="#{admin.modal.delete.title}">Confirmar Eliminación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p th:text="#{admin.modal.delete.tournament.confirm(${tournament.name})}">
          ¿Está seguro que desea eliminar el torneo este torneo?
        </p>
        <p class="text-danger"><strong th:text="#{admin.modal.delete.warning}">Esta acción no se puede deshacer.</strong></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{admin.button.cancel}">Cancelar</button>
        <form th:action="@{'/admin/tournament/delete/' + ${tournament.id}}" method="POST" style="display: inline;">
          <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash me-2"></i>
            <span th:text="#{admin.tournament.modal.button.delete}">Eliminar</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
