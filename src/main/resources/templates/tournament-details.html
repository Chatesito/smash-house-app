<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head}"></head>
<body class="bg-light">
<div th:replace="~{base :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="fas fa-trophy me-2"></i>
                        <span th:text="#{tournament.details.title}">Detalles del Torneo</span>
                    </h3>
                </div>
                <div class="card-body">
                    <h2 class="card-title" th:text="${tournament.name}"></h2>
                    <div class="mb-4">
                        <p class="text-muted mb-2">
                            <i class="fas fa-calendar me-2"></i>
                            <span th:text="${#temporals.format(tournament.eventDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>
                        <p class="text-muted">
                            <i class="fas fa-map-marker-alt me-2"></i>
                            <span th:text="${tournament.location}"></span>
                        </p>
                    </div>
                    <div class="mb-4">
                        <h5 th:text="#{tournament.details.description}">Descripción</h5>
                        <p th:text="${tournament.description}"></p>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/tournaments" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>
                            <span th:text="#{tournament.button.back}">Volver</span>
                        </a>
                        <div sec:authorize="hasRole('ROLE_ADMIN')">
                            <a th:href="@{'/admin/tournament/edit/' + ${tournament.id}}"
                               class="btn btn-warning me-2">
                                <i class="fas fa-edit me-1"></i>
                                <span th:text="#{tournament.button.edit}">Editar</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
