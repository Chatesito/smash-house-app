<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head}"></head>
<body class="bg-light">
<div th:replace="~{base :: navbar}"></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">
            <i class="fas fa-user-circle me-2"></i>
            <span th:text="#{player.details.title}">Perfil de Jugador</span>
          </h3>
        </div>
        <div class="card-body">
          <div class="text-center mb-4">
            <h2 th:text="${player.nickname}" class="mb-0"></h2>
            <span class="badge bg-warning text-dark"
                  th:text="#{player.details.rank(${player.position})}">
            </span>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="card mb-3">
                <div class="card-header">
                  <h5 class="mb-0" th:text="#{player.details.stats}">Estadísticas</h5>
                </div>
                <div class="card-body">
                  <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                      <span th:text="#{player.details.points}">Puntos</span>
                      <span class="badge bg-primary" th:text="${player.points}"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                      <span th:text="#{player.details.tournaments.won}">Torneos Ganados</span>
                      <span class="badge bg-success" th:text="${player.tournamentsWon + '/' + player.tournamentsPlayed}"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                      <span th:text="#{player.details.matches.won}">Partidas Ganadas</span>
                      <span class="badge bg-info" th:text="${player.matchesWon}"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                      <span th:text="#{player.details.winrate}">Win Rate</span>
                      <span class="badge bg-warning text-dark"
                            th:text="${#numbers.formatDecimal(player.winRate, 1, 1) + '%'}"></span>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card mb-3">
                <div class="card-header">
                  <h5 class="mb-0" th:text="#{player.details.characters}">Personajes</h5>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <h6 th:text="#{player.details.main}">Principal</h6>
                    <span class="badge bg-primary" th:text="${player.mainCharacter}"></span>
                  </div>
                  <div th:if="${player.secondaryCharacter}">
                    <h6 th:text="#{player.details.secondary}">Secundario</h6>
                    <span class="badge bg-secondary" th:text="${player.secondaryCharacter}"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${player.achievements}" class="card mb-3">
            <div class="card-header">
              <h5 class="mb-0" th:text="#{player.details.achievements}">Logros</h5>
            </div>
            <div class="card-body">
              <p class="card-text" th:text="${player.achievements}"></p>
            </div>
          </div>

          <div class="d-flex justify-content-between">
            <a href="/ranking" class="btn btn-secondary">
              <i class="fas fa-arrow-left me-2"></i>
              <span th:text="#{player.details.back}">Volver al Ranking</span>
            </a>
            <span sec:authorize="hasAnyRole('ADMIN', 'ROLE_ADMIN')">
              <a th:href="@{'/admin/player/' + ${player.id}}"
                 class="btn btn-warning me-2">
                  <i class="fas fa-edit"></i>
                  <span th:text="#{player.details.edit}">Editar</span>
              </a>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
