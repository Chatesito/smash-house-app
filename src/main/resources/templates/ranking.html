<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head}"></head>
<body class="bg-light">
<div th:replace="~{base :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow">
                <!-- Mensajes de éxito/error al eliminar jugadores -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">
                        <i class="fas fa-trophy me-2 text-warning"></i>
                        <span th:text="#{ranking.title}">Ranking de Jugadores - Smash House Neiva</span>
                    </h3>
                    <div>
                        <a href="/ranking/report" class="btn btn-info me-2">
                            <i class="fas fa-file-pdf me-1"></i>
                            <span th:text="#{ranking.download.report}">Descargar Reporte</span>
                        </a>
                        <a sec:authorize="hasRole('ROLE_ADMIN')"
                           th:href="@{/admin/player/new}"
                           class="btn btn-warning">
                            <i class="fas fa-plus me-1"></i>
                            <span th:text="#{ranking.add.player}">Añadir Jugador</span>
                        </a>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th th:text="#{ranking.table.tag}">Tag</th>
                                <th th:text="#{ranking.table.points}">Puntos</th>
                                <th th:text="#{ranking.table.tournaments}">Torneos</th>
                                <th th:text="#{ranking.table.winrate}">Win Rate</th>
                                <th th:text="#{ranking.table.characters}">Personajes</th>
                                <th th:text="#{ranking.table.details}">Detalles</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="player : ${players}">
                                <td>
                                        <span class="badge"
                                              th:classappend="${player.position <= 3 ? 'bg-warning text-dark' : 'bg-secondary'}"
                                              th:text="${player.position}">
                                        </span>
                                </td>
                                <td th:text="${player.nickname}"></td>
                                <td th:text="${player.points}"></td>
                                <td>
                                    <span th:text="${player.tournamentsWon + '/' + player.tournamentsPlayed}"></span>
                                </td>
                                <td>
                                    <div class="progress" style="height: 20px;">
                                        <div class="progress-bar bg-success"
                                             th:style="'width: ' + ${player.winRate} + '%'"
                                             th:text="${#numbers.formatDecimal(player.winRate, 1, 1) + '%'}">
                                        </div>
                                    </div>
                                </td>
                                <td>
                                        <span th:text="${player.mainCharacter}"
                                              class="badge bg-primary me-1"></span>
                                    <span th:if="${player.secondaryCharacter}"
                                          th:text="${player.secondaryCharacter}"
                                          class="badge bg-secondary"></span>
                                </td>
                                <td>
                                    <a th:href="@{'/player/' + ${player.id}}"
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="fas fa-info-circle"></i>
                                        <span th:text="#{ranking.button.details}">Ver más</span>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
